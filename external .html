<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odd Even Checker</title>
</head>
<body style="margin:0; font-family:Arial, sans-serif; background:#f4f4f4; display:flex; justify-content:center; align-items:center; height:100vh;">

    <div style="
        background:white;
        width:450px;
        height:300px;
        padding:40px;
        border-radius:15px;
        box-shadow:0 0 15px rgba(0,0,0,0.2);
        text-align:center;
    ">
        <h1 style="color:#333; margin-bottom:25px;">
            Odd Even Checker
        </h1>

        <input
            type="number"
            id="number"
            placeholder="Enter a number"
            style="
                width:90%;
                padding:12px;
                font-size:18px;
                border:1px solid #ccc;
                border-radius:5px;
                margin-bottom:20px;
            "
        >

        <br>

        <button
            onclick="checkNumber()"
            style="
                padding:12px 25px;
                font-size:18px;
                background:#007bff;
                color:white;
                border:none;
                border-radius:5px;
                cursor:pointer;
            "
        >
            Check
        </button>

        <p
            id="result"
            style="
                margin-top:25px;
                font-size:22px;
                font-weight:bold;
            "
        ></p>
    </div>

    <script>
        function checkNumber() {
            let num = document.getElementById("number").value;
            let result = document.getElementById("result");

            if (num === "") {
                result.innerHTML = "Please enter a number!";
                result.style.color = "red";
            } 
            else if (num % 2 === 0) {
                result.innerHTML = num + " is an Even Number";
                result.style.color = "green";
            } 
            else {
                result.innerHTML = num + " is an Odd Number";
                result.style.color = "orange";
            }
        }
    </script>

</body>
</html>
